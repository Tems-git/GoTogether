- name: Publish update
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          CI: true
        run: |
          set +e
          eas update --branch preview --platform all --message "$COMMIT_MESSAGE"
          echo "=== eas.json ==="
          cat eas.json
          echo "=== app.json ==="
          cat app.json
          echo "=== Node version ==="
          node --version
          echo "=== EAS CLI version ==="
          eas --version
