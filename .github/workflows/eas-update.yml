- name: Publish update
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          CI: true
          EXPO_DEBUG: true
          DEBUG: expo:*
        run: |
          eas update --branch preview --platform all --message "$COMMIT_MESSAGE" 2>&1 || true
          echo "=== Exit code was non-zero, showing eas.json ==="
          cat eas.json
          echo "=== Showing app.json ==="
          cat app.json
